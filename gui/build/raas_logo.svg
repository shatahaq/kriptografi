<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
    <defs>
        <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00e5ff" />
            <stop offset="100%" stop-color="#7c4dff" />
        </linearGradient>
        <linearGradient id="neonGradLight" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7c4dff" />
            <stop offset="100%" stop-color="#00e5ff" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="32" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glowLight" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="16" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Background Square (Rounded) -->
    <rect width="1024" height="1024" rx="240" fill="#0a0e17" />
    <rect width="976" height="976" x="24" y="24" rx="216" fill="none" stroke="rgba(0, 229, 255, 0.15)" stroke-width="8" />

    <!-- Outer Cybernetic Shield -->
    <path d="M512 160 L800 300 L800 640 C800 800 512 900 512 900 C512 900 224 800 224 640 L224 300 Z" 
          fill="none" stroke="url(#neonGrad)" stroke-width="32" stroke-linejoin="round" opacity="0.3" filter="url(#glow)"/>
          
    <path d="M512 200 L760 320 L760 620 C760 760 512 840 512 840 C512 840 264 760 264 620 L264 320 Z" 
          fill="none" stroke="url(#neonGrad)" stroke-width="12" stroke-linejoin="round" stroke-dasharray="40 20" opacity="0.6"/>

    <!-- The 'R' Monogram (Modern/Hacker Style) -->
    <g transform="translate(40, -20)">
        <!-- R Vertical Stem -->
        <line x1="380" y1="360" x2="380" y2="680" stroke="url(#neonGradLight)" stroke-width="64" stroke-linecap="round" filter="url(#glowLight)" />
        
        <!-- R Top Loop -->
        <path d="M380 400 L560 400 C640 400 680 460 680 500 C680 550 620 600 540 600 L380 600" 
              fill="none" stroke="url(#neonGradLight)" stroke-width="64" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowLight)" />
              
        <!-- R Diagonal Leg -->
        <line x1="520" y1="600" x2="660" y2="760" stroke="url(#neonGradLight)" stroke-width="64" stroke-linecap="round" filter="url(#glowLight)" />
    </g>

    <!-- Decorator Nodes / Circuits -->
    <circle cx="512" cy="480" r="24" fill="#00e5ff" filter="url(#glowLight)" />
    <circle cx="512" cy="160" r="16" fill="#7c4dff" filter="url(#glow)" />
    <circle cx="512" cy="900" r="16" fill="#00e5ff" filter="url(#glow)" />
    
    <line x1="180" y1="460" x2="240" y2="460" stroke="#00e5ff" stroke-width="12" stroke-linecap="round" />
    <line x1="784" y1="580" x2="844" y2="580" stroke="#7c4dff" stroke-width="12" stroke-linecap="round" />
</svg>